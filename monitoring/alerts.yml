groups:
  - name: retailpulse_alerts
    interval: 30s
    rules:
      # API Performance Alerts
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "API response time is above 1 second for 5 minutes"

      # Error Rate Alerts
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes"

      # Database Alerts
      - alert: HighDBConnections
        expr: pg_stat_database_numbackends > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Database has {{ $value }} active connections"

      # Model Performance Alerts
      - alert: ModelDriftDetected
        expr: drift_score > 0.25
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Model drift detected"
          description: "Data drift score is {{ $value }} - retraining recommended"

      # Resource Alerts
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="retailpulse"}[5m])) / sum(kube_pod_container_resource_limits_cpu_cores) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for 10 minutes"

      - alert: HighMemoryUsage
        expr: sum(container_memory_usage_bytes{namespace="retailpulse"}) / sum(kube_pod_container_resource_limits_memory_bytes) > 0.9
        for: 10m
        labels:
          severity: warning
          annotations:
            summary: "High memory usage"
            description: "Memory usage is above 90% for 10 minutes"

      # Business Metrics Alerts
      - alert: RevenueDrop
        expr: (sum(rate(sales_revenue_total[1h])) / sum(rate(sales_revenue_total[24h]))) < 0.5
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Significant revenue drop"
          description: "Revenue has dropped by more than 50% compared to yesterday"

      - alert: HighChurnRisk
        expr: churn_rate > 0.15
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High churn risk detected"
          description: "Customer churn rate is above 15%"