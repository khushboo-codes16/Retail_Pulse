version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: retailpulse_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-retailpulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
      POSTGRES_DB: ${DB_NAME:-retailpulse_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - retailpulse_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-retailpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: retailpulse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - retailpulse_network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: retailpulse_mlflow
    environment:
      DB_USER: ${DB_USER:-retailpulse}
      DB_PASSWORD: ${DB_PASSWORD:-securepassword}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-retailpulse_db}
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/app/mlflow_artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retailpulse_network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retailpulse_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-retailpulse}:${DB_PASSWORD:-securepassword}@postgres:5432/${DB_NAME:-retailpulse_db}
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mlflow:
        condition: service_started
    networks:
      - retailpulse_network
    restart: unless-stopped

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: retailpulse_dashboard
    environment:
      API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    depends_on:
      - api
      - mlflow
    networks:
      - retailpulse_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: retailpulse_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - dashboard
      - api
      - mlflow
    networks:
      - retailpulse_network
    restart: unless-stopped

networks:
  retailpulse_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts: